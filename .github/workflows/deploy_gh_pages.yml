name: Build and Deploy Programming Guides

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string for docs (default: latest for main, pr-preview-N for PR)'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: "latest"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tools/requirements-docs.txt

      - name: Install doxygen and esp-doxybook
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y doxygen
          python3 -m pip install --upgrade pip
          python3 -m pip install -r tools/requirements-docs.txt

      - name: Build docs
        run: |
          set -euo pipefail
          version="${{ github.event.inputs.version || '' }}"
          if [[ -z "$version" ]]; then
            if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              version="pr-preview-${{ github.event.pull_request.number }}"
            else
              version="latest"
            fi
          fi
          python3 ./tools/build_docs.py --version "$version" --output-dir docs_build_output --no-fail-fast

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --include-fragments
            --root-dir docs_build_output
            --exclude-path '.*/404\.html$'
            docs_build_output/**/*.html
          # Fail the action if broken links are found
          fail: true

      # Create directory structure for GitHub Pages with "version prefix"
      - name: Prepare pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository_owner == 'espressif'
        run: |
          set -euo pipefail
          version="latest"
          mkdir -p "gh-pages/$version"
          cp -r docs_build_output/* "gh-pages/$version/"

      - name: Upload pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository_owner == 'espressif'
        uses: actions/upload-pages-artifact@v4
        with:
          path: gh-pages

      - name: Upload docs artifact for PR review
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: docs-preview-pr-${{ github.event.pull_request.number }}
          path: docs_build_output
          if-no-files-found: error

      - name: Generate build summary
        if: always()
        run: |
          set -euo pipefail
          {
            echo "## Docs Build Summary"
            echo ""
            echo "| Parameter | Value |"
            echo "|-----------|-------|"
            echo "| **Status** | ${{ job.status }} |"
            echo "| **Event** | ${{ github.event_name }} |"
            echo "| **Branch** | ${{ github.ref_name }} |"
            echo "| **Commit** | ${{ github.sha }} |"
            echo "| **By** | ${{ github.actor }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository_owner == 'espressif'
    needs: build
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}latest/
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Setup pages
        uses: actions/configure-pages@v5
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Generate deploy summary
        if: always()
        run: |
          set -euo pipefail
          {
            echo "## Docs Deploy Summary"
            echo ""
            echo "| Parameter | Value |"
            echo "|-----------|-------|"
            echo "| **Status** | ${{ job.status }} |"
            echo "| **Environment** | github-pages |"
            echo "| **URL** | ${{ steps.deployment.outputs.page_url }}latest/ |"
          } >> "$GITHUB_STEP_SUMMARY"
